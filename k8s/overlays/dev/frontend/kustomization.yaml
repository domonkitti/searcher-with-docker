apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: searchable-from-book-dev
resources:
  - ../../../base/frontend
patches:
  - path: patch-deployment.yaml
  - path: patch-ingress.yaml
images:
